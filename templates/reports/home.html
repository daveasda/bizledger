{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-between mb-6 flex-wrap gap-2">
  <h1 class="text-2xl font-semibold">Dashboard</h1>
  <div class="text-base md:text-lg text-slate-700 bg-white rounded-full px-4 py-1.5 shadow border font-semibold">
    {{ now|date:"d-M-Y" }} &middot; {{ now|time:"H:i" }}
  </div>
</div>

<!-- Accounting Features -->
<div class="bg-white rounded-xl shadow p-6 mb-6">
  <h2 class="font-semibold text-lg text-slate-700 mb-4">Accounting Features</h2>
  <div class="flex flex-wrap gap-3">
    <a href="{% url 'ledger:accounts_gateway' %}" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Accounts Info</a>
    <a href="{% url 'inventory:purchase_voucher_create' %}" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Vouchers</a>
    <a href="{% url 'reports:reports_list' %}" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Reports</a>
  </div>
</div>

<!-- Inventory Features -->
<div class="bg-white rounded-xl shadow p-6 mb-10">
  <h2 class="font-semibold text-lg text-slate-700 mb-4">Inventory Features</h2>
  <div class="flex flex-wrap gap-3">
    <a href="{% url 'inventory:stock_groups_display' %}" class="px-5 py-2.5 bg-slate-700 text-white rounded-lg hover:bg-slate-800 font-medium">Stock Groups</a>
    <a href="{% url 'inventory:stock_items_display' %}" class="px-5 py-2.5 bg-slate-700 text-white rounded-lg hover:bg-slate-800 font-medium">Stock Items</a>
    <a href="{% url 'inventory:units_display' %}" class="px-5 py-2.5 bg-slate-700 text-white rounded-lg hover:bg-slate-800 font-medium">Unit of Measure</a>
    <a href="{% url 'inventory:stock_summary' %}" class="px-5 py-2.5 bg-slate-700 text-white rounded-lg hover:bg-slate-800 font-medium">Stock Summary</a>
  </div>
</div>

<div class="bg-white rounded-xl shadow p-6">
  <h2 class="font-semibold mb-4">Quick Actions</h2>
  <div class="flex flex-wrap gap-4">
    <a href="/org/select-business/" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Select Business</a>
  </div>
</div>
{% endblock %}
