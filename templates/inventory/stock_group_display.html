{% extends "inventory/base_inventory.html" %}
{% block inventory_content %}
<div class="bg-white border rounded p-6 max-w-3xl mx-auto">
  <div class="bg-slate-700 text-white px-4 py-2 mb-4 font-semibold text-center rounded">Stock Group Display</div>

  <div class="space-y-4 bg-amber-50 p-6 rounded border border-amber-200">
    <div>
      <label class="block text-sm font-semibold text-gray-800 mb-1">Name</label>
      <div class="bg-white border rounded px-3 py-2 text-sm">{{ group.name }}</div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-800 mb-1">Alias</label>
      <div class="bg-white border rounded px-3 py-2 text-sm">{{ group.alias|default:"—" }}</div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-800 mb-1">Under</label>
      <div class="bg-white border rounded px-3 py-2 text-sm">{{ group.parent|default:"Primary" }}</div>
    </div>

    <div class="flex gap-2 pt-4">
      <a href="{% url 'inventory:stock_group_alter' group.pk %}" class="px-6 py-2 bg-slate-700 text-white rounded hover:bg-slate-800 font-semibold">Alter</a>
      <form method="post" action="{% url 'inventory:stock_group_delete' group.pk %}" class="inline" onsubmit="return confirm('Delete this stock group?');">
        {% csrf_token %}
        <button type="submit" class="px-6 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400 font-semibold">Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
