{% extends "inventory/base_inventory.html" %}
{% block inventory_content %}
<div class="bg-white border rounded p-6 max-w-3xl mx-auto">
  <div class="bg-slate-700 text-white px-4 py-2 mb-4 font-semibold text-center rounded">Unit Display</div>

  <div class="space-y-4 bg-amber-50 p-6 rounded border border-amber-200">
    <div>
      <label class="block text-sm font-semibold text-gray-800 mb-1">Symbol</label>
      <div class="bg-white border rounded px-3 py-2 text-sm">{{ unit.symbol }}</div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-800 mb-1">Formal name</label>
      <div class="bg-white border rounded px-3 py-2 text-sm">{{ unit.formal_name|default:"—" }}</div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-800 mb-1">Number of decimal places</label>
      <div class="bg-white border rounded px-3 py-2 text-sm">{{ unit.decimal_places }}</div>
    </div>

    <div class="flex gap-2 pt-4">
      <a href="{% url 'inventory:unit_alter' unit.pk %}" class="px-6 py-2 bg-slate-700 text-white rounded hover:bg-slate-800 font-semibold">Alter</a>
      <form method="post" action="{% url 'inventory:unit_delete' unit.pk %}" class="inline" onsubmit="return confirm('Delete this unit?');">
        {% csrf_token %}
        <button type="submit" class="px-6 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400 font-semibold">Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
