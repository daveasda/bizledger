{% extends "base.html" %}
{% block content %}
<div class="min-h-screen bg-gray-50">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <style>
      .voucher-form-container {
        max-width: 1100px;
        margin-left: auto;
        margin-right: auto;
        padding: 24px 28px;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
      }

      .voucher-header {
        padding: 10px 16px;
        font-size: 16px;
      }

      .voucher-section-title {
        margin-top: 20px;
        margin-bottom: 10px;
        font-size: 15px;
        font-weight: 600;
      }

      .voucher-form-container input[type="text"],
      .voucher-form-container input[type="number"],
      .voucher-form-container input[type="date"],
      .voucher-form-container input[type="email"],
      .voucher-form-container select,
      .voucher-form-container .form-control {
        height: 38px;
        padding: 6px 10px;
        font-size: 14px;
      }

      .voucher-form-container .form-row,
      .voucher-form-container .row {
        margin-bottom: 12px;
      }

      .voucher-form-container .particular-row {
        height: 42px;
      }

      .voucher-form-container .particular-row input,
      .voucher-form-container .particular-row select {
        height: 36px;
      }

      .voucher-form-container .particular-row + .particular-row {
        margin-top: 6px;
      }

      .voucher-form-container .table th {
        padding: 8px;
        font-size: 13px;
        font-weight: 600;
      }

      .voucher-form-container .table td {
        padding: 6px;
      }

      .voucher-form-container textarea {
        min-height: 80px;
        padding: 8px;
      }

      .voucher-form-container button {
        height: 36px;
        padding: 6px 14px;
        border-radius: 6px;
      }
    </style>
    {% if business %}
    <div class="flex items-center justify-between mb-6">
      <div>
        <div class="text-xs text-gray-500">Active Business</div>
        <div class="text-xl font-semibold">{{ business }}</div>
      </div>
      <div class="flex gap-2">
        <a href="{% url 'reports:home' %}" class="px-3 py-2 rounded bg-white border hover:bg-gray-50">Dashboard</a>
      </div>
    </div>
    {% endif %}

    {% if messages %}
    <div class="space-y-2 mb-6">
      {% for message in messages %}
      <div class="p-3 rounded border bg-white text-sm">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    {% block inventory_content %}{% endblock %}
  </div>
</div>
{% endblock %}
